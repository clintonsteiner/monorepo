name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Bootstrap Pants
        uses: ./.github/actions/setup-pants

      - name: Check BUILD files are current
        run: |
          pants tailor --check ::

      - name: Check BUILD file formatting
        run: |
          pants update-build-files --check ::

      - name: Run lint and formatting checks
        run: |
          pants lint ::
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Bootstrap Pants
        uses: ./.github/actions/setup-pants

      - name: Run non-Docker tests
        run: |
          pants --tag='-docker' test ::

  package:
    name: Build PEX Artifacts
    runs-on: ubuntu-latest
    needs:
      - validate
      - unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Bootstrap Pants
        uses: ./.github/actions/setup-pants

      - name: Package PEX files
        run: |
          pants package //ercot_lmp:pex //examples/hello_world:pex

      - name: Upload PEX artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pex-files
          path: |
            dist/*.pex
          retention-days: 14

  docker-integration:
    name: Docker Integration
    runs-on: ubuntu-latest
    needs:
      - validate
      - unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Bootstrap Pants
        uses: ./.github/actions/setup-pants

      - name: Build Docker images
        run: |
          pants package //ercot_lmp:docker //infra/db_setup:docker

      - name: Run Docker integration tests
        run: |
          pants --tag='docker' test ::

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - validate
      - unit-tests
      - package
      - docker-integration

    steps:
      - name: Summarize results
        run: |
          echo "## CI results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Validate: ${{ needs.validate.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Unit tests: ${{ needs.unit-tests.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Package: ${{ needs.package.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Docker integration: ${{ needs.docker-integration.result }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when required jobs failed
        if: needs.validate.result != 'success' || needs.unit-tests.result != 'success' || needs.package.result != 'success' || needs.docker-integration.result != 'success'
        run: |
          exit 1
