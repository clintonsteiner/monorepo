name: Setup Pants
description: Checkout prerequisites for Pants-based jobs

inputs:
  python-version:
    description: Python version to install
    required: false
    default: "3.11"
  cache-key-suffix:
    description: Optional suffix for the Pants cache key
    required: false
    default: "v2"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Initialize Pants
      uses: pantsbuild/actions/init-pants@main
      with:
        gha-cache-key: ${{ inputs.cache-key-suffix }}
        named-caches-hash: ${{ hashFiles('pants.toml', 'pyproject.toml', 'uv.lock') }}
